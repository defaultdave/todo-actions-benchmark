name: Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    name: Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read .claude/agents/review.md and follow its instructions exactly.

            PR to review: #${{ github.event.pull_request.number }}
            PR title: ${{ github.event.pull_request.title }}
            Repo: ${{ github.repository }}

            Steps:
            1. Get the diff: `gh pr diff ${{ github.event.pull_request.number }}`
            2. Read the linked issue for requirements context
            3. Follow the review agent instructions (scope audit, security, correctness, docs, type hygiene, UX completeness)
            4. Post your verdict as a PR comment:
               `gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "..."`

            Verdict must be one of: APPROVE / APPROVE_WITH_NITS / REQUEST_CHANGES
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
